<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Día 4: Mis Buenos Días en el Mundo 🌍</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FFF5F6 0%, #FCE4E6 100%);
            --wine-main: #6B2D5C;
            --rose-gold: #B76E79;
            --champagne: #F7E7CE;
            --white-card: rgba(255, 255, 255, 0.82);
            --text-dark: #4A2834;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            padding: 3rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* --- 🌟 MOTOR DE EFECTOS ESPECIALES DEL FONDO --- */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .magic-glow-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 30%, rgba(247, 231, 206, 0.35) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
            animation: pulseGlow 8s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        header, .main-container, .back-btn-container {
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .day-title {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--rose-gold);
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 2.1rem;
            color: var(--wine-main);
            line-height: 1.2;
        }

        .subtitle {
            margin-top: 0.6rem;
            font-size: 0.95rem;
            max-width: 420px;
            line-height: 1.5;
            opacity: 0.85;
            margin-left: auto;
            margin-right: auto;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* --- 🎬 REPRODUCTOR CINEMÁTICO PREMIUM --- */
        .video-cinema-box {
            background: var(--white-card);
            border: 1px solid rgba(183, 110, 121, 0.3);
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 12px 35px rgba(107, 45, 92, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .video-cinema-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(107, 45, 92, 0.15);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 177.77%; /* Proporción 9:16 vertical para videos de celular */
            border-radius: 16px;
            overflow: hidden;
            background: #11070e;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- 🗺️ CONTENEDOR DE IDIOMAS (CARTELERA) --- */
        .languages-card {
            background: rgba(255, 255, 255, 0.65);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px dashed rgba(183, 110, 121, 0.4);
            text-align: center;
        }

        .languages-title {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: var(--wine-main);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .languages-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .lang-tag {
            background: #fff;
            color: var(--text-dark);
            font-size: 0.82rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 15px;
            border: 1px solid rgba(183, 110, 121, 0.15);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .back-btn-container {
            margin-top: 2rem;
            text-align: center;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--wine-main);
            border: 1px solid var(--wine-main);
            padding: 10px 22px;
            border-radius: 30px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            background: var(--wine-main);
            color: var(--champagne);
            box-shadow: 0 4px 15px rgba(107, 45, 92, 0.2);
        }
    </style>
</head>
<body>

    <!-- Canvas para mantener el fondo dinámico de estrellas/partículas -->
    <canvas id="bgCanvas"></canvas>

    <!-- Capa de brillo mágico de ambiente -->
    <div class="magic-glow-overlay"></div>

    <header>
        <p class="day-title">SORPRESA DEL DÍA 4</p>
        <h1 class="main-title">Mis Buenos Días</h1>
        <p class="subtitle">No importa el idioma, las culturas ni las fronteras... mi primer pensamiento al despertar siempre tiene el mismo significado: tú. ☀️</p>
    </header>

    <main class="main-container">
        
        <!-- PANTALLA DE VIDEO ESTILIZADA -->
        <div class="video-cinema-box">
            <div class="video-wrapper">
                <!-- 
                    Configuración de Drive: Cambia ID_DE_TU_VIDEO por la ID real del video en tu Google Drive.
                    Nota: 'playsinline' evita que iOS abra el video en pantalla completa nativa por defecto.
                -->
                <video controls playsinline preload="metadata" src="https://drive.google.com/uc?export=download&id=ID_DE_TU_VIDEO"></video>
            </div>
        </div>

        <!-- DEDICATORIA DE LOS IDIOMAS -->
        <div class="languages-card">
            <h3 class="languages-title">Un saludo que cruza el mundo</h3>
            <div class="languages-grid">
                <span class="lang-tag">Francés 🇫🇷</span>
                <span class="lang-tag">Italiano 🇮🇹</span>
                <span class="lang-tag">Alemán 🇩🇪</span>
                <span class="lang-tag">Inglés 🇬🇧</span>
                <span class="lang-tag">Coreano 🇰🇷</span>
                <span class="lang-tag">Español 💖</span>
            </div>
        </div>

    </main>

    <div class="back-btn-container">
        <!-- Navegación directa en la misma pestaña hacia el index -->
        <a href="../index.html" class="back-btn">Volver al Calendario 🗓️</a>
    </div>

    <script>
        // --- 🌟 MOTOR DE EFECTOS ESPECIALES DINÁMICOS MANTENIDO ---
        function initBgParticles() {
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            let particlesArray = [];
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const colors = ['#B76E79', '#D4AF37', '#6B2D5C', '#FFD1DC', '#FFFFFF'];

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2.5 + 1;
                    this.speedX = Math.random() * 0.4 - 0.2;
                    this.speedY = Math.random() * -0.4 - 0.1;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.alpha = Math.random() * 0.5 + 0.2;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    if (this.y < 0 || this.alpha <= 0) {
                        this.y = canvas.height;
                        this.x = Math.random() * canvas.width;
                        this.alpha = Math.random() * 0.5 + 0.2;
                    }
                }
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = this.color;
                    ctx.fill();
                    ctx.restore();
                }
            }

            function createParticles() {
                const numberOfParticles = 35;
                for (let i = 0; i < numberOfParticles; i++) {
                    particlesArray.push(new Particle());
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                    particlesArray[i].draw();
                }
                requestAnimationFrame(animate);
            }

            createParticles();
            animate();
        }

        initBgParticles();
    </script>
</body>
</html>
